name: Resumo Convergencia BR

# Resumo sintetico que cruza Trifecta x Onda 3 - SO os destaques (convergencias + isolados fortes)
# + noticias relevantes por ativo. Acoes BR. Agenda B3 (BRT): 09:11, 10:03, 11:11-18:11 (cada hora).
# 09:11 = pre-abertura | 10:03 = abertura+3min (1a barra 2m fechada). Minutos escalonados p/ evitar fila.
on:
  schedule:
    - cron: '11 12 * * 1-5'                        # 09:11 BRT (pre-abertura B3)
    - cron: '3 13 * * 1-5'                        # 10:03 BRT (abertura+3min)
    - cron: '11 14,15,16,17,18,19,20,21 * * 1-5'  # 11:11 a 18:11 BRT (hora em hora)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: America/Sao_Paulo
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar resumo BR (gera o relatorio HTML)
        shell: pwsh
        run: ./resumo_br_scan.ps1 -SemEmail -OutFile resumo_br_report.html

      - name: Salvar sinais para backtest
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
          git add signals/ 2>/dev/null || true
          git diff --cached --quiet && echo "Sem novos sinais." || (git commit -m "signals: $(date -u +%Y-%m-%d) resumo_br" && git pull --rebase origin HEAD || true && git push origin HEAD)

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat resumo_br_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Resumo Convergencia BR <${{ secrets.GMAIL_USER }}>
          html_body: file://resumo_br_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@resumo_br_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
