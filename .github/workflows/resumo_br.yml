name: Resumo Convergencia BR

# Resumo sintetico que cruza Trifecta x Onda 3 - SO os destaques (convergencias + isolados fortes)
# + noticias relevantes por ativo. Acoes BR. Mesma agenda B3: 10:15,12:15,14:15,16:15,18:15 BRT.
on:
  schedule:
    - cron: '15 13,15,17,19,21 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar resumo BR (gera o relatorio HTML)
        shell: pwsh
        run: ./resumo_br_scan.ps1 -SemEmail -OutFile resumo_br_report.html

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat resumo_br_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Resumo Convergencia BR <${{ secrets.GMAIL_USER }}>
          html_body: file://resumo_br_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@resumo_br_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
