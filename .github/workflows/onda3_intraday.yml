name: Onda3 Day Trade Scan

# Scanner Day Trade - Onda 3 (timeframes 1m + 5m + 15m). Acoes BR (B3).
# Hora em hora, seg-sex, mesmo padrao do Resumo Convergencia BR:
#   09:00 BRT (pre-abertura) | 10:03 BRT (abertura+3min) | 11:00 a 18:00 BRT.
# BRT = UTC-3. Cron em UTC.
on:
  workflow_dispatch:  # Sob demanda apenas (agendamento automatico desativado para nao congestionar a fila)

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: America/Sao_Paulo
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar scan intraday (gera o relatorio HTML)
        shell: pwsh
        run: ./onda3_intraday_scan.ps1 -SemEmail -OutFile onda3_intraday_report.html

      - name: Salvar sinais para backtest
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
          git add signals/ 2>/dev/null || true
          git diff --cached --quiet && echo "Sem novos sinais." || (git commit -m "signals: $(date -u +%Y-%m-%d) onda3_intraday" && git pull --rebase origin HEAD || true && git push origin HEAD)

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat onda3_intraday_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Onda3 Day Trade Scanner <${{ secrets.GMAIL_USER }}>
          html_body: file://onda3_intraday_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@onda3_intraday_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
