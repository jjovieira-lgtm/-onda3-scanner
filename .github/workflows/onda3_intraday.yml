name: Onda3 Intraday Scan

# Foco intradiario/semanal (timeframes 1m + 5m + 15m).
# Roda de segunda a sexta a cada 2h a partir da abertura da B3 (10:00 BRT):
#   10:15, 12:15, 14:15, 16:15 e 18:15 (fechamento da leitura) BRT.
# BRT = UTC-3, entao em UTC: 13:15, 15:15, 17:15, 19:15, 21:15.
# Tambem pode ser disparado manualmente pelo botao "Run workflow".
on:
  # Agenda automatica DESATIVADA na consolidacao (23/06/2026): detalhe roda SOB DEMANDA (Run workflow).
  # O Resumo de Convergencia BR ja cobre o intraday. Para reativar, descomente abaixo (B3 10:15-18:15 BRT):
  #  schedule:
  #    - cron: '15 13,15,17,19,21 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar scan intraday (gera o relatorio HTML)
        shell: pwsh
        run: ./onda3_intraday_scan.ps1 -SemEmail -OutFile onda3_intraday_report.html

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat onda3_intraday_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Onda3 Intraday Scanner <${{ secrets.GMAIL_USER }}>
          html_body: file://onda3_intraday_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@onda3_intraday_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
