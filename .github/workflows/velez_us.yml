name: Trifecta US Scan (Oliver Velez)

# Scanner Trifecta (Oliver Velez) - timeframes 2m/5m/15m, gatilho barra elefante - mercado US (NYSE/Nasdaq).
# SOB DEMANDA desde a consolidacao (23/06/2026): roda via "Run workflow".
# Para reativar a agenda automatica, descomente o schedule abaixo. SEM gate de hora (licao 23/06/2026:
# o atraso do GitHub fazia o gate de DST bloquear o envio). Cron fixo no horario de verao de NY (EDT):
#   9:33, 9:45, 11:45, 13:45, 15:45, 17:45 ET. No inverno (EST) some 1h em cada hora do cron.
on:
  # schedule:
  #   - cron: '33 13 * * 1-5'
  #   - cron: '45 13,15,17,19,21 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar scan (gera o relatorio HTML)
        shell: pwsh
        run: ./velez_us_scan.ps1 -SemEmail -OutFile velez_us_report.html

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat velez_us_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Trifecta US Scanner <${{ secrets.GMAIL_USER }}>
          html_body: file://velez_us_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@velez_us_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
