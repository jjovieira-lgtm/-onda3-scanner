name: Trifecta US Scan (Oliver Velez)

# Scanner Trifecta Day Trade (Oliver Velez) - timeframes 2m/5m/15m, gatilho barra elefante - mercado US.
# Hora em hora, seg-sex, mesmo padrao do Resumo Convergencia US (EDT = UTC-4 em verao):
#   8:30 ET (pre-abertura NYSE) | 9:33 ET (abertura+3min) | 10:30 a 17:30 ET.
# No inverno (EST, ~nov-mar) somar 1h nas horas UTC do cron.
on:
  schedule:
    - cron: '30 12 * * 1-5'                        # 8:30 ET (pre-abertura NYSE)
    - cron: '33 13 * * 1-5'                        # 9:33 ET (abertura+3min)
    - cron: '30 14,15,16,17,18,19,20,21 * * 1-5'  # 10:30 a 17:30 ET (hora em hora)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar scan (gera o relatorio HTML)
        shell: pwsh
        run: ./velez_us_scan.ps1 -SemEmail -OutFile velez_us_report.html

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat velez_us_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Trifecta US Scanner <${{ secrets.GMAIL_USER }}>
          html_body: file://velez_us_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@velez_us_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
