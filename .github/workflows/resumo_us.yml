name: Resumo Convergencia US

# Resumo sintetico que cruza Trifecta x Onda 3 - SO os destaques + noticias - acoes US.
# Horarios de Nova Iorque (verao/EDT): 8:37, 9:33, 10:37-17:37 (hora em hora).
# 8:37 = pre-abertura | 9:33 = abertura+3min (1a barra 2m fechada). Minutos escalonados p/ evitar fila.
#
# SEM "gate" de hora: cron fixo no horario de verao (EDT = UTC-4), todo disparo envia.
# No inverno (EST, ~nov-mar) somar 1h nas horas UTC do cron (ex.: 14 vira 15, etc.).
on:
  # schedule desativado temporariamente (08/07/2026) — pausa geral pedida pelo usuário.
  # schedule:
  #   - cron: '37 12 * * 1-5'                        # 8:37 ET (pre-abertura NYSE)
  #   - cron: '33 13 * * 1-5'                        # 9:33 ET (abertura+3min)
  #   - cron: '37 14,15,16,17,18,19,20,21 * * 1-5'  # 10:37 a 17:37 ET (hora em hora)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: America/New_York
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar resumo US (gera o relatorio HTML)
        shell: pwsh
        run: ./resumo_us_scan.ps1 -SemEmail -OutFile resumo_us_report.html

      - name: Salvar sinais para backtest
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
          git add signals/ 2>/dev/null || true
          git diff --cached --quiet && echo "Sem novos sinais." || (git commit -m "signals: $(date -u +%Y-%m-%d) resumo_us" && git pull --rebase origin HEAD || true && git push origin HEAD)

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat resumo_us_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Resumo Convergencia US <${{ secrets.GMAIL_USER }}>
          html_body: file://resumo_us_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@resumo_us_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
