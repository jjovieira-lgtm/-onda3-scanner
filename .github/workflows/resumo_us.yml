name: Resumo Convergencia US

# Resumo sintetico que cruza Trifecta x Onda 3 - SO os destaques + noticias - acoes US.
# Horarios de Nova Iorque (verao/EDT): 8:30, 9:33, 9:45, 11:45, 13:45, 15:45, 17:45 ET.
# 8:30 = pre-abertura (1h antes, noticias) | 9:33 = abertura+3min (1a barra elefante 2m fechada).
#
# SEM "gate" de hora: ele foi REMOVIDO em 23/06/2026. Motivo: o agendador do GitHub atrasa
# as execucoes (15-50 min), entao o run caia numa hora fora da janela {09,11,13,15,17} e o
# gate bloqueava o envio. Agora o cron e fixo no horario de verao dos EUA (EDT = UTC-4) e
# todo disparo envia. No inverno (EST, ~nov-mar) estes horarios saem 1h mais cedo em ET;
# para corrigir nesse periodo, somar 1h nas horas do cron (passar p/ 14,16,18,20,22).
on:
  schedule:
    - cron: '30 12 * * 1-5'           # 8:30 ET (1h antes abertura NYSE, EDT=UTC-4, noticias pre-mercado)
    - cron: '33 13 * * 1-5'           # 9:33 ET (abertura+3min, captura 1a barra elefante 2m)
    - cron: '45 13,15,17,19,21 * * 1-5'  # 9:45, 11:45, 13:45, 15:45, 17:45 ET
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar resumo US (gera o relatorio HTML)
        shell: pwsh
        run: ./resumo_us_scan.ps1 -SemEmail -OutFile resumo_us_report.html

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat resumo_us_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Resumo Convergencia US <${{ secrets.GMAIL_USER }}>
          html_body: file://resumo_us_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@resumo_us_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
