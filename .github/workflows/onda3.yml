name: Onda3 Daily Scan

# Roda de segunda a sexta as 22:00 UTC = 19:00 BRT (Brasil, UTC-3).
# Tambem pode ser disparado manualmente pelo botao "Run workflow".
on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar scan (gera o relatorio HTML)
        shell: pwsh
        run: ./onda3_daily_scan.ps1 -SemEmail -OutFile onda3_report.html

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat onda3_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Diagnostico de credenciais (NAO revela a senha)
        run: |
          echo "Tamanho do GMAIL_USER..........: ${#GU}  (esperado 19 para jjovieira@gmail.com)"
          echo "Tamanho do GMAIL_APP_PASSWORD..: ${#GP}  (esperado 16, SEM espacos)"
          if [ ${#GU} -eq 0 ]; then echo ">> PROBLEMA: GMAIL_USER esta VAZIO (nome do secret errado?)"; fi
          if [ ${#GP} -eq 0 ]; then echo ">> PROBLEMA: GMAIL_APP_PASSWORD esta VAZIO (nome do secret errado?)"; fi
          if [ ${#GP} -ne 16 ] && [ ${#GP} -ne 0 ]; then echo ">> ATENCAO: senha tem ${#GP} caracteres (se for 19, ha espacos; remova-os)"; fi
        env:
          GU: ${{ secrets.GMAIL_USER }}
          GP: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Onda3 Scanner <${{ secrets.GMAIL_USER }}>
          html_body: file://onda3_report.html
