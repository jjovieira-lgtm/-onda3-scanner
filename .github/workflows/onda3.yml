name: Onda3 SWING TRADE Scan

# Scanner Swing Trade - Onda 3 (D + 2h + 30m). Acoes BR (B3).
# A cada 2 horas a partir das 09:17 BRT, seg-sex:
#   09:17, 11:17, 13:17, 15:17, 17:17, 19:17 BRT = 12:17, 14:17, 16:17, 18:17, 20:17, 22:17 UTC.
# Minutos escalonados (17 ao inves de 00) para fugir do congestionamento do GitHub Actions.
on:
  schedule:
    - cron: '17 12,14,16,18,20,22 * * 1-5'  # 09:17, 11:17, 13:17, 15:17, 17:17, 19:17 BRT
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: America/Sao_Paulo
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Rodar scan (gera o relatorio HTML)
        shell: pwsh
        run: ./onda3_daily_scan.ps1 -SemEmail -OutFile onda3_report.html

      - name: Salvar sinais para backtest
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
          git add signals/ 2>/dev/null || true
          git diff --cached --quiet && echo "Sem novos sinais." || (git commit -m "signals: $(date -u +%Y-%m-%d) onda3" && git pull --rebase origin HEAD || true && git push origin HEAD)

      - name: Ler assunto do email
        id: meta
        run: echo "subject=$(cat onda3_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: jjovieira@gmail.com
          from: Onda3 SWING TRADE <${{ secrets.GMAIL_USER }}>
          html_body: file://onda3_report.html

      - name: Enviar Telegram
        run: |
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@onda3_telegram.txt" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          echo "Resposta Telegram: $RESP"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
